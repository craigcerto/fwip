name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          cd python
          pip install -e .
          pip install pytest pytest-cov
      - name: Run tests
        run: |
          cd python
          pytest tests/ -v --cov=fwip --cov-report=term-missing --cov-fail-under=90

  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: |
          cd typescript
          npm ci
      - name: Run tests
        run: |
          cd typescript
          npx vitest run --coverage
